server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /kontakt {
    return 301 /kontakt/;
  }

  location = /api/youtube-feed {
    resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
    proxy_ssl_server_name on;
    proxy_set_header Host www.youtube.com;
    proxy_set_header Accept-Encoding "";
    proxy_pass https://www.youtube.com/feeds/videos.xml?$args;
  }

  location /api/github/ {
    resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
    proxy_ssl_server_name on;
    proxy_set_header Host api.github.com;
    proxy_set_header User-Agent "croolyypage-nginx";
    proxy_set_header Accept "application/vnd.github+json";
    proxy_pass https://api.github.com/;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
